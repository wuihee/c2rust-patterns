pattern: vec

required_components:
  state:
    - data_pointer
    - length
    - capacity
  semantic_patterns:
    push:
      - capacity_guard
      - push_value
      - length_update
  capability_patterns:
    resize:
      - capacity_growth
      - reallocation
      - data_update
      - capacity_update

examples:
  - id: curl_dynbuf_vec_push
    status: valid
    repo: curl
    path: examples/vec/valid/curl/dynbuf_vec_push.c
    source:
      - repos/curl/lib/curlx/dynbuf.h
      - repos/curl/lib/curlx/dynbuf.c

  - id: curl_appenddata_vec_push
    status: valid
    repo: curl
    path: examples/vec/valid/curl/appenddata_vec_push.c
    source:
      - repos/curl/tests/server/getpart.c

  - id: parson_json_array_vec_push
    status: valid
    repo: parson
    path: examples/vec/valid/parson/json_array_vec_push.c
    source:
      - repos/parson/parson.c

  - id: inih_missing_push_and_length_state
    status: invalid
    repo: inih
    path: examples/vec/invalid/inih/missing_push_and_length_state.c
    source:
      - repos/inih/ini.c
    missing_components:
      - state.length
      - semantic_patterns.push.push_value
      - semantic_patterns.push.length_update
